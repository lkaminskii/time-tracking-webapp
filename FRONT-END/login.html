<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Ponto</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="container">
        <h1>Sistema de Registro de Ponto</h1>

        <div id="alert" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF (apenas números)" maxlength="11"
                    required>
                <small style="color: #777;">Apenas números, 11 dígitos</small>
            </div>

            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe" name="rememberMe">
                <label for="rememberMe">Mantenha-me conectado</label>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Autenticando...</p>
            </div>

            <button type="submit" class="btn" id="btnLogin">Entrar</button>
        </form>

        <p style="text-align: center; margin-top: 20px; color: #777;">
            Use CPF: 12345678900 | Senha: admin123 (para admin)
        </p>
    </div>

    <script src="scripts/api.js"></script>
    <script src="scripts/auth.js"></script>
</body>

</html>
